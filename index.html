<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lecture 14</title>
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/media.css" />
  </head>
  <body>
    <main>
      <section>
        <div class="container1">
          <form class="myform" action="">
            <div class="leftarea">
              <textarea
                class="mytextarea"
                name="mytextarea"
                id="description"
                placeholder="description"
              ></textarea>
            </div>
            <div class="rightarea">
              <label for="subjects,users,emails"></label>
              <input
                class="mysubject"
                type=""
                id="subjects"
                placeholder="subject"
              />
              <input
                class="myuser"
                type=""
                id="users"
                placeholder="Name / Surname"
              />
              <input
                class="myemail"
                type="email"
                id="emails"
                placeholder="email"
              />
              <input
                class="mybutton"
                type="submit"
                value="send"
                name="button"
                id=""
              />
            </div>
          </form>
        </div>
      </section>
      <section class="section2">
        <div class="container2">    
            
        </div>
      </section>
    </main>
  </body>
</html>
